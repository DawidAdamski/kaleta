[[tool.importlinter.contracts]]
id = "services-no-ui"
name = "Services must not import views or nicegui"
type = "forbidden"
source_modules = ["kaleta.services"]
forbidden_modules = ["kaleta.views", "nicegui"]

[[tool.importlinter.contracts]]
id = "api-no-views"
name = "API must not import views"
type = "forbidden"
source_modules = ["kaleta.api"]
forbidden_modules = ["kaleta.views"]

[dependency-groups]
dev = [
    "bandit>=1.9.4",
    "import-linter>=2.13",
]
