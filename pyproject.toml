[project]
name = "kaleta"
version = "0.1.0"
description = "Kaleta - Personal Budget & Finance Management Application"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [
    { name = "Dawid" },
]
dependencies = [
    "nicegui>=3.14.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pydantic>=2.13",
    "pydantic-settings>=2.14.2",
    "uvicorn>=0.42.0",
    "aiosqlite>=0.20",
    "greenlet>=3.5",
    "prophet>=1.1",
    "fastapi>=0.139.0",
]

[project.optional-dependencies]
postgres = [
    "psycopg2-binary>=2.9",
    "asyncpg>=0.29",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=7.1.0",
    "pytest-playwright>=0.5",
    "ruff>=0.15.8",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "faker>=40.11.1",
    "bandit>=1.7",
    "coverage>=7.13.5",
    "import-linter>=2.13",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
]

[project.scripts]
kaleta = "kaleta.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kaleta"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# FastAPI uses Depends/Query in argument defaults — B008 is a false positive there.
"src/kaleta/api/**" = ["B008"]

[tool.mypy]
python_version = "3.13"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.importlinter]
root_package = "kaleta"
include_external_packages = true
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
id = "layers"
name = "Layered architecture (views → services → models)"
type = "layers"
layers = [
    "kaleta.views",
    "kaleta.api",
    "kaleta.pwa",
    "kaleta.services",
    "kaleta.schemas",
    "kaleta.i18n",
    "kaleta.models",
    "kaleta.db",
    "kaleta.config",
]
ignore_imports = [
    # db.audit registers AuditLog in Base.metadata at import time.
    "kaleta.db.audit -> kaleta.models.audit_log",
]

[[tool.importlinter.contracts]]
id = "views-no-data-access"
name = "Views must not import models, db, or sqlalchemy directly"
type = "forbidden"
source_modules = ["kaleta.views"]
forbidden_modules = ["kaleta.models", "kaleta.db", "sqlalchemy"]
allow_indirect_imports = true
ignore_imports = [
    # Existing view-layer violations; burn down via q3-views-refactor.
    "kaleta.views.accounts -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.accounts -> kaleta.models.account",  # TODO(q3-views-refactor)
    "kaleta.views.accounts -> kaleta.models.institution",  # TODO(q3-views-refactor)
    "kaleta.views.budget_builder -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.budget_builder -> kaleta.models.category",  # TODO(q3-views-refactor)
    "kaleta.views.budgets -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.budgets -> kaleta.models.category",  # TODO(q3-views-refactor)
    "kaleta.views.categories -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.categories -> kaleta.models.category",  # TODO(q3-views-refactor)
    "kaleta.views.credit -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.credit -> kaleta.models.account",  # TODO(q3-views-refactor)
    "kaleta.views.credit -> kaleta.models.credit",  # TODO(q3-views-refactor)
    "kaleta.views.dashboard -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.dashboard -> sqlalchemy",  # TODO(q3-views-refactor)
    "kaleta.views.forecast -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.housekeeping -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.institution_avatar -> kaleta.models.institution",  # TODO(q3-views-refactor)
    "kaleta.views.institutions -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.institutions -> kaleta.models.institution",  # TODO(q3-views-refactor)
    "kaleta.views.layout -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.monthly_readiness -> kaleta.db",  # TODO(q3-views-refactor)
    "kaleta.views.net_worth -> kaleta.db",  # TODO(q3-views-refactor)
