services:
  kaleta:
    build: .
    ports:
      - "8080:8080"
    environment:
      - KALETA_DB_URL=sqlite:///data/kaleta.db
      - KALETA_HOST=0.0.0.0
      - KALETA_PORT=8080
    volumes:
      - kaleta-data:/app/data
    restart: unless-stopped

