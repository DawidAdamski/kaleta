site_name: Kaleta
site_description: Kaleta product documentation
site_url: https://dawidadamski.github.io/kaleta/
repo_url: https://github.com/DawidAdamski/kaleta
repo_name: DawidAdamski/kaleta

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Product:
      - Overview: product/index.md
      - Dashboard: product/dashboard.md
      - Financial Wizard: product/financial-wizard.md
  - Roadmap: roadmap.md
  - Walkthrough:
      - Overview: walkthrough/index.md
  - Technical:
      - Architecture: architecture.md
      - Architecture Decision Records:
          - "ADR-001: NiceGUI as UI Framework": adr/001-nicegui-as-ui-framework.md
