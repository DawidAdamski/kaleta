name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search [existing issues](https://github.com/DawidAdamski/kaleta/issues) first.
        For security vulnerabilities, use [Security Advisories](https://github.com/DawidAdamski/kaleta/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Start Kaleta with ...
        2. Navigate to ...
        3. Click ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kaleta version or commit
      description: Git commit SHA, tag, or "main" if running from source.
      placeholder: main @ abc1234
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - web (browser)
        - app (desktop window)
        - api (headless)
        - Docker / Podman
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, database (SQLite / PostgreSQL), browser if relevant.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Relevant log output or screenshots (redact personal financial data).
    validations:
      required: false
