name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .cla/signatures.json
          path-to-document: >-
            https://github.com/${{ github.repository }}/blob/main/docs/cla.md
          branch: cla-signatures
          allowlist: bot*,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: >-
            Thank you for your contribution to Kaleta! Before we can merge this
            pull request, please read and sign our
            [Individual Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/docs/cla.md).
            To sign, copy and paste this comment on the pull request:

            > I have read the CLA Document and I hereby sign the CLA
