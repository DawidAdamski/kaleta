name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/

      - name: Import linter
        run: uv run lint-imports

      - name: Doc link checker
        run: uv run python scripts/check_doc_links.py

      - name: SPDX headers
        run: uv run python scripts/check_spdx_headers.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Unit tests
        run: uv run pytest tests/unit/ -q

      - name: Integration tests
        run: uv run pytest tests/integration/ -q

      - name: Spec coverage
        run: uv run python scripts/spec_coverage.py

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kaleta
          POSTGRES_PASSWORD: kaleta
          POSTGRES_DB: kaleta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaleta -d kaleta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      KALETA_DB_URL: postgresql+asyncpg://kaleta:kaleta@localhost:5432/kaleta
      KALETA_DEBUG: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --extra postgres

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Unit tests
        run: uv run pytest tests/unit/ -q

      - name: Integration tests
        run: uv run pytest tests/integration/ -q
